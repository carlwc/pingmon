# ═══════════════════════════════════════════════════════════════════════════════
# pingmon.conf — PingMon v2 Configuration
# ═══════════════════════════════════════════════════════════════════════════════

[server]
# TCP port for the web interface
port = 9090

# Number of Waitress worker threads (handles concurrent web requests)
# 8 is comfortable for a small team; raise to 16+ for heavier use
threads = 8

[ping]
# Seconds between full device sweeps
interval_seconds = 300

# Per-ping timeout before a host is marked DOWN
timeout_seconds = 2

# ICMP packets sent per host per sweep (1 is standard)
count = 1

# Max random pre-ping delay in seconds (spreads load, avoids traffic bursts)
jitter_max_seconds = 8

[database]
# SQLite database path — leave as-is to keep it in the app folder
file = pingmon.db
